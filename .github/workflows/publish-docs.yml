name: Publish Docs
on:
  workflow_dispatch:
  push:
    branches:
      - 'master' # run only for master

jobs:
  publish:
    name: Publish to retype branch

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: retypeapp/action-build@latest

      - uses: retypeapp/action-github-pages@latest
        with:
          update-branch: true
