name: Publish Docs
on:
  workflow_dispatch:
  push:
    branches:
      - 'master' # run only for master

jobs:
  publish:
    name: Publish to docs-site branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: retypeapp/action-build@latest
        with:
          config_path: docs/

      - uses: retypeapp/action-github-pages@latest
        with:
          branch: docsite
          update-branch: true
